services:
  app:
    build: .
    command: npx expo start --lan
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "8081:8081" # Port Metro Bundler
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=192.168.1.84
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.1.84
    stdin_open: true # Permet l'interaction avec le terminal
    tty: true
